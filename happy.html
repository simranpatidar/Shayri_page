<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="shayari.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nata+Sans:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body{
            background-image: url("bgpage.jpg");
            background-repeat:round;
            background-size: contain;
            width:100vw;
            margin:0;
            overflow-x: hidden;
            font-family: "Roboto", sans-serif;
        }
        h1{
            text-align: center;
            color:black;
        }
        a{
            text-decoration:none;
        }
        .img1{
                height:500px;
                width:600px;
                border:none;
                margin-left:400px;
                background-image: url("sad1.jpg");
                background-repeat: no-repeat;
                background-size: cover;
                animation-name:ex;
                animation-duration:10s;
                animation-timing-function:ease-in;
                animation-delay:1s;
                animation-iteration-count:infinite;
                border-radius: 10px;
        }
        @keyframes ex{
            0%{
                background-image: url("sad3.jpg");
                background-size:cover;
            }
            30%{
                background-image: url("sad2.jpg");
                background-size:cover;
            }
            70%{
                background-image: url("sad1.jpg");
                background-size:cover;
            }
            100%{
                background-image: url("sad4.jpg");
                background-size:cover;
            }
        }

        .main{
            border-radius:10px;
            display:grid;
            height:150vh;
            width:100vw;
            justify-content: space-around;
            padding:22px;
            gap:15px;
            margin-top: 50px;
            grid-template-columns: auto auto auto;
        }   
        .grid{
            padding:70px 120px;
            background-color:rgba(210, 105, 30, 0.651); 
            border-radius:10px;
        }
        .grid:hover{
            scale:1.05;
            transition:2s;
        }
        footer{
            margin:0;
            display:flex;
            justify-content: space-between;
            height:15vh;
            background-color:rgb(245, 197, 139);
            color:black;
        }
        #p1{
            margin-left:20px;
            margin-top: 30px;
        }
        #p2{
            margin-right:30px;
            margin-top:30px;
        }
    </style>
</head>
<body>
    
       <a href="index.html"> <h1>Happy Shayari</h1></a>
        <br><br><br>
        <div class="img1">
            
        </div>
    <div class="main">
        <div class="grid">1</div>
        <div class="grid">2</div>
        <div class="grid">3</div>
        <div class="grid">4</div>
        <div class="grid">5</div>
        <div class="grid">6</div>
        <div class="grid">7</div>
        <div class="grid">8</div>
        <div class="grid">9</div>
        <div class="grid">10</div>
        <div class="grid">11</div>
        <div class="grid">12</div>
        <div class="grid">13</div>
        <div class="grid">14</div>
        <div class="grid">15</div>
    </div>
    <footer>
        <p id="p1">copyright-simran patidar</p>
        <p id="p2">contact-9098684156</p>
    </footer>
</body>
</html>
